name: Generated Files

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: lts/jod

jobs:
  generated-files:
    name: Update generated files
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate code
        run: pnpm codegen

      - name: Build packages
        run: pnpm build

      - name: Measure bundle sizes
        run: pnpm bundle:size

      - name: Check for generated changes
        id: changes
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token
        if: steps.changes.outputs.has_changes == 'true'
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.RELEASE_SYNC_APP_ID }}
          private-key: ${{ secrets.RELEASE_SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Resolve GitHub App bot identity
        if: steps.changes.outputs.has_changes == 'true'
        id: app-user
        run: |
          set -euo pipefail
          user_id=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${APP_SLUG}%5Bbot%5D" \
            | jq -r .id)
          echo "user-id=${user_id}" >> "$GITHUB_OUTPUT"
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}

      - name: Configure GitHub App bot identity
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_USER_ID: ${{ steps.app-user.outputs.user-id }}

      - name: Commit generated files
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A -- . ':(exclude)bundle-size.jsonc'
          if git diff --cached --quiet; then
            echo "Generated files unchanged, nothing to commit"
          else
            git commit -m "chore: update generated files [automatic]"
          fi

      - name: Commit bundle sizes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add bundle-size.jsonc
          if git diff --cached --quiet; then
            echo "Bundle sizes unchanged, nothing to commit"
          else
            git commit -m "chore: update bundle sizes [automatic]"
          fi

      - name: Push generated changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_HEAD_REF}"
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
