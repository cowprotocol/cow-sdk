name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: lts/jod

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      # 1️⃣ Checkout the repo
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # 2️⃣ Setup pnpm
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      # 3️⃣ Setup Node
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/jod
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # 4️⃣ Upgrade npm for trusted publishing (requires npm >= 11.5.1)
      # - run: npm install -g npm@latest
      - run: npm install -g npm@~11.10.0 # https://github.com/npm/cli/issues/9151

      # 5️⃣ Install dependencies
      - run: pnpm install --frozen-lockfile

      # 6️⃣ Build all packages (using turbo)
      - run: pnpm turbo run build --filter=./packages/**

      # 7️⃣ Run release-please
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      # 8️⃣ Publish changed packages
      - name: Publish changed packages
        if: steps.release.outputs.releases_created == 'true'
        run: pnpm publish -r --filter="./packages/**" --tag latest --no-git-checks --provenance

  deploy-to-s3:
    needs: release-please
    if: needs.release-please.result == 'success' && needs.release-please.outputs.releases_created == 'true'
    uses: ./.github/workflows/deploy-to-s3.yml
    permissions:
      id-token: write
      contents: read
    secrets: inherit
