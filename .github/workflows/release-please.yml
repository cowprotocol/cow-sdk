name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: lts/jod

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      # 1️⃣ Checkout the repo
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # 2️⃣ Setup pnpm
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.8.0

      # 3️⃣ Setup Node
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/jod
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # 4️⃣ Upgrade npm for trusted publishing (requires npm >= 11.5.1)
      - run: npm install -g npm@latest

      # 5️⃣ Install dependencies
      - run: pnpm install --frozen-lockfile

      # 6️⃣ Build all packages (using turbo)
      - run: pnpm turbo run build --filter=./packages/**

      # 7️⃣ Run release-please
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      # 8️⃣ Publish changed packages
      - name: Publish changed packages
        if: steps.release.outputs.releases_created == 'true'
        run: pnpm publish -r --filter="./packages/**" --tag latest --no-git-checks --provenance

  deploy-to-s3:
    needs: release-please
    if: needs.release-please.result == 'success' && needs.release-please.outputs.releases_created == 'true'
    uses: ./.github/workflows/deploy-to-s3.yml
    permissions:
      id-token: write
      contents: read
    secrets: inherit
