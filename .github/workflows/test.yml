name: Unit tests & Coverage
on:
  pull_request:
  push:
    branches: [main]

env:
  NODE_VERSION: lts/*

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@3d86a7cc43670094ac248017207be0295edbc31d
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Generate code
        run: pnpm codegen

      - name: Run tests
        run: pnpm test

  coverage-badges:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Generate code
        run: pnpm codegen

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Update coverage badges
        run: pnpm coverage:badges

      - name: Open coverage badges PR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- README.md packages/*/README.md; then
            echo "Coverage badges unchanged, nothing to commit"
            exit 0
          fi
          BRANCH="chore/update-coverage-badges"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add README.md packages/*/README.md
          git commit -m "chore: update coverage badges"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BRANCH"
          if gh pr view "$BRANCH" --json state --jq '.state' 2>/dev/null | grep -q OPEN; then
            echo "PR already open for $BRANCH, updated with latest badges"
          else
            gh pr create --base main --head "$BRANCH" \
              --title "chore: update coverage badges" \
              --body "Automated coverage badge update from the latest \`main\` build."
          fi
